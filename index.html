<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบสอบออนไลน์ โรงเรียนศรีสุตาวิทยา</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #0F3D3E;
    --forest-light: #16544f;
    --gold: #E8C77E;
    --gold-deep: #C9A455;
    --cream: #FAF7F0;
    --ink: #2D2A26;
    --success: #4ADE80;
    --danger: #DC2626;
  }
  * { font-family: 'Noto Sans Thai', sans-serif; }
  body {
    background: linear-gradient(135deg, #FAF7F0 0%, #F0E9D8 45%, #E8DCC0 100%);
    color: var(--ink);
    min-height: 100vh;
  }
  .font-display { font-weight: 800; letter-spacing: -0.01em; }

  .btn-primary {
    background: var(--forest);
    color: var(--cream);
    transition: all .18s ease;
  }
  .btn-primary:hover { background: var(--forest-light); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-gold {
    background: var(--gold);
    color: var(--forest);
    transition: all .18s ease;
  }
  .btn-gold:hover { background: var(--gold-deep); transform: translateY(-1px); }

  .card-surface {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(15,61,62,0.08);
  }

  .input-field {
    border: 1.5px solid #E2D9C4;
    background: #fff;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .input-field:focus {
    outline: none;
    border-color: var(--forest);
    box-shadow: 0 0 0 3px rgba(15,61,62,0.12);
  }
  .input-field.is-invalid {
    border-color: var(--danger);
    box-shadow: 0 0 0 3px rgba(220,38,38,0.10);
  }

  .class-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }

  .modal-backdrop {
    background: rgba(15,30,30,0.45);
    backdrop-filter: blur(2px);
  }

  .toast-success {
    background: #ECFDF3;
    border: 1px solid #6EE7A8;
    color: #15803D;
  }
  .toast-error {
    background: #FEF2F2;
    border: 1px solid #FCA5A5;
    color: #B91C1C;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #D6CBB0; border-radius: 4px; }

  @keyframes slideUp { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform: translateY(0); } }
  .animate-slide-up { animation: slideUp .35s ease forwards; }

  @keyframes toastIn { from { opacity:0; transform: translateX(40px); } to { opacity:1; transform: translateX(0); } }
  .animate-toast { animation: toastIn .3s ease forwards; }

  .spinner {
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    width: 18px; height: 18px;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  table.data-table th { font-weight: 600; color: var(--forest); }
  table.data-table tbody tr { transition: background .12s ease; }
  table.data-table tbody tr:hover { background: rgba(15,61,62,0.04); }
</style>
</head>
